version: "3.8"

services:
  # --- 1. FastAPI Application ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gm-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://gm_user:gm_password@db:5432/greenmoment
      - LOCAL_STORAGE_PATH=/app/data/storage
      - FIREBASE_CREDENTIALS_PATH=/app/credentials.json
    volumes:
      # Persist ML cache and forecast artifacts across container restarts
      - ./data/storage:/app/data/storage
      # Mount Firebase credentials (read-only)
      - ./credentials.json:/app/credentials.json:ro
    depends_on:
      db:
        condition: service_healthy

  # --- 2. PostgreSQL Database ---
  db:
    image: postgres:15-alpine
    container_name: gm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gm_user
      POSTGRES_PASSWORD: gm_password
      POSTGRES_DB: greenmoment
    volumes:
      # Persist database data across container restarts
      - ./data/pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gm_user -d greenmoment"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- 3. Cloudflare Tunnel ---
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: gm-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api
